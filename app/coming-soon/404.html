<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — devstash.me</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0B0F1E;
    --surface: #141928;
    --accent: #6366F1;
    --accent-light: #818CF8;
    --accent-pale: #A5B4FC;
    --text: #E2E8F0;
    --muted: #64748B;
    --muted2: #94A3B8;
    --border: rgba(99,102,241,0.18);
  }

  html, body { height: 100%; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Animated gradient mesh background ── */
  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift linear infinite;
  }

  .orb-1 {
    width: 600px; height: 600px;
    background: #6366F1;
    top: -200px; left: -100px;
    animation-duration: 18s;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 500px; height: 500px;
    background: #818CF8;
    bottom: -150px; right: -100px;
    animation-duration: 22s;
    animation-delay: -7s;
  }
  .orb-3 {
    width: 400px; height: 400px;
    background: #4F46E5;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-duration: 15s;
    animation-delay: -3s;
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(40px, -30px) scale(1.05); }
    50%  { transform: translate(-20px, 50px) scale(0.95); }
    75%  { transform: translate(-50px, -20px) scale(1.08); }
    100% { transform: translate(0, 0) scale(1); }
  }

  .orb-1 { animation-name: drift1; }
  .orb-2 { animation-name: drift2; }
  .orb-3 { animation-name: drift3; }

  @keyframes drift1 {
    0%,100% { transform: translate(0,0); }
    33%     { transform: translate(60px, 40px); }
    66%     { transform: translate(-40px, 70px); }
  }
  @keyframes drift2 {
    0%,100% { transform: translate(0,0); }
    33%     { transform: translate(-70px, -50px); }
    66%     { transform: translate(30px, -30px); }
  }
  @keyframes drift3 {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.3); }
  }

  /* Grid overlay */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none;
  }

  /* ── Main content ── */
  .page {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem;
    width: 100%;
    max-width: 680px;
  }

  /* ── SVG Animation ── */
  .svg-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s ease both;
  }

  /* ── Glitch 404 text ── */
  .glitch-wrap {
    position: relative;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .glitch {
    font-family: 'Syne', sans-serif;
    font-size: clamp(5rem, 18vw, 9rem);
    font-weight: 800;
    letter-spacing: -0.05em;
    line-height: 1;
    color: var(--text);
    position: relative;
    display: inline-block;
  }

  .glitch::before,
  .glitch::after {
    content: '404';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .glitch::before {
    color: var(--accent);
    animation: glitch1 3.5s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
  }

  .glitch::after {
    color: #22D3EE;
    animation: glitch2 3.5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
  }

  @keyframes glitch1 {
    0%, 90%, 100% { transform: translate(0); opacity: 0; }
    92%           { transform: translate(-4px, 2px); opacity: 0.7; }
    94%           { transform: translate(4px, -2px); opacity: 0.7; }
    96%           { transform: translate(-2px, 0); opacity: 0.7; }
    98%           { transform: translate(0); opacity: 0; }
  }

  @keyframes glitch2 {
    0%, 88%, 100% { transform: translate(0); opacity: 0; }
    90%           { transform: translate(4px, -3px); opacity: 0.6; }
    93%           { transform: translate(-3px, 2px); opacity: 0.6; }
    96%           { transform: translate(2px, 0); opacity: 0; }
  }

  /* ── Terminal card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    width: 100%;
    max-width: 480px;
    animation: fadeUp 0.7s 0.2s ease both;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
  }

  .card-bar {
    background: #1C2438;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .dots { display: flex; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #FF5F57; }
  .dot-y { background: #FEBC2E; }
  .dot-g { background: #28C840; }

  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin: 0 auto;
    padding-right: 44px;
  }

  .card-body {
    padding: 1.75rem 2rem 2rem;
  }

  .terminal-lines {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8125rem;
    text-align: left;
    margin-bottom: 1.5rem;
  }

  .tline {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
  }

  .tline:nth-child(1) { animation-delay: 0.4s; }
  .tline:nth-child(2) { animation-delay: 0.8s; }
  .tline:nth-child(3) { animation-delay: 1.2s; }
  .tline:nth-child(4) { animation-delay: 1.6s; }

  .prompt { color: var(--accent-light); flex-shrink: 0; }
  .tcmd   { color: var(--muted2); }
  .terror { color: #F87171; }
  .tok    { color: #4ADE80; }

  .subtitle {
    font-size: 0.9375rem;
    color: var(--muted2);
    line-height: 1.65;
    margin-bottom: 1.75rem;
    opacity: 0;
    animation: fadeIn 0.4s 2s ease forwards;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeIn 0.4s 2.3s ease forwards;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9375rem;
    font-weight: 500;
    padding: 0 22px;
    height: 44px;
    border-radius: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .btn-home:hover { background: var(--accent-light); transform: translateY(-1px); }
  .btn-home:active { transform: scale(0.97); }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--muted2);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8125rem;
    padding: 0 18px;
    height: 44px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer;
    background: none;
  }

  .btn-back:hover { color: var(--accent-light); border-color: rgba(99,102,241,0.4); }

  /* ── Logo top ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2.5rem;
    text-decoration: none;
    animation: fadeDown 0.6s ease both;
  }

  .logo-icon { width: 36px; height: 36px; flex-shrink: 0; }

  .logo-wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.125rem;
    font-weight: 500;
  }

  .bracket { color: var(--accent-light); }
  .name    { color: var(--text); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Scan line effect on SVG ── */
  .scanline {
    animation: scan 4s linear infinite;
  }

  @keyframes scan {
    0%   { transform: translateY(-120px); opacity: 0; }
    10%  { opacity: 0.15; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(260px); opacity: 0; }
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .svg-wrap { max-width: 300px; margin-bottom: 1.75rem; }
    .card-body { padding: 1.25rem 1.25rem 1.5rem; }
    .btn-row { flex-direction: column; align-items: stretch; }
    .btn-home, .btn-back { justify-content: center; }
    .logo { margin-bottom: 1.75rem; }
  }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-mesh" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-grid" aria-hidden="true"></div>

<main class="page">

  <!-- Logo -->
  <a class="logo" href="/" aria-label="devstash home">
    <svg class="logo-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="76" height="76" rx="14" fill="#141928" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
      <rect x="16" y="22" width="48" height="9" rx="4.5" fill="#6366F1"/>
      <rect x="16" y="36" width="35" height="9" rx="4.5" fill="#818CF8"/>
      <rect x="16" y="50" width="23" height="9" rx="4.5" fill="#A5B4FC"/>
    </svg>
    <div class="logo-wordmark">
      <span class="bracket">&lt;</span><span class="name">devstash</span><span class="bracket">/&gt;</span>
    </div>
  </a>

  <!-- Animated SVG illustration -->
  <div class="svg-wrap" aria-hidden="true">
    <svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" width="100%">
      <defs>
        <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1C2438"/>
          <stop offset="100%" stop-color="#141928"/>
        </linearGradient>
        <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6366F1"/>
          <stop offset="100%" stop-color="#818CF8"/>
        </linearGradient>
        <clipPath id="screenClip">
          <rect x="60" y="20" width="360" height="150" rx="6"/>
        </clipPath>
      </defs>

      <!-- Monitor body -->
      <rect x="40" y="10" width="400" height="165" rx="10" fill="#1C2438" stroke="rgba(99,102,241,0.25)" stroke-width="1.5"/>

      <!-- Screen -->
      <rect x="60" y="20" width="360" height="145" rx="6" fill="url(#screenGrad)"/>

      <!-- Scan line animation -->
      <rect class="scanline" x="60" y="20" width="360" height="6" fill="rgba(99,102,241,0.25)" clip-path="url(#screenClip)"/>

      <!-- Top bar dots -->
      <circle cx="82" cy="36" r="5" fill="#FF5F57"/>
      <circle cx="98" cy="36" r="5" fill="#FEBC2E"/>
      <circle cx="114" cy="36" r="5" fill="#28C840"/>
      <line x1="60" y1="48" x2="420" y2="48" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>

      <!-- Code lines — animated drawing -->
      <!-- Line 1 -->
      <rect x="80" y="62" width="0" height="8" rx="3" fill="#6366F1" opacity="0.9">
        <animate attributeName="width" from="0" to="30" dur="0.3s" begin="0.3s" fill="freeze"/>
      </rect>
      <rect x="116" y="62" width="0" height="8" rx="3" fill="#94A3B8" opacity="0.7">
        <animate attributeName="width" from="0" to="80" dur="0.4s" begin="0.6s" fill="freeze"/>
      </rect>
      <rect x="202" y="62" width="0" height="8" rx="3" fill="#F87171" opacity="0.8">
        <animate attributeName="width" from="0" to="50" dur="0.3s" begin="1.0s" fill="freeze"/>
      </rect>

      <!-- Line 2 -->
      <rect x="80" y="80" width="0" height="8" rx="3" fill="#818CF8" opacity="0.6">
        <animate attributeName="width" from="0" to="20" dur="0.2s" begin="0.5s" fill="freeze"/>
      </rect>
      <rect x="106" y="80" width="0" height="8" rx="3" fill="#94A3B8" opacity="0.5">
        <animate attributeName="width" from="0" to="110" dur="0.5s" begin="0.7s" fill="freeze"/>
      </rect>

      <!-- Line 3 — ERROR line highlight -->
      <rect x="72" y="96" width="340" height="14" rx="3" fill="rgba(248,113,113,0.1)" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/>
      </rect>
      <rect x="80" y="99" width="0" height="8" rx="3" fill="#F87171" opacity="0.9">
        <animate attributeName="width" from="0" to="15" dur="0.2s" begin="1.2s" fill="freeze"/>
      </rect>
      <rect x="101" y="99" width="0" height="8" rx="3" fill="#F87171" opacity="0.7">
        <animate attributeName="width" from="0" to="200" dur="0.5s" begin="1.4s" fill="freeze"/>
      </rect>

      <!-- Line 4 -->
      <rect x="80" y="118" width="0" height="8" rx="3" fill="#818CF8" opacity="0.6">
        <animate attributeName="width" from="0" to="20" dur="0.2s" begin="0.8s" fill="freeze"/>
      </rect>
      <rect x="106" y="118" width="0" height="8" rx="3" fill="#94A3B8" opacity="0.4">
        <animate attributeName="width" from="0" to="60" dur="0.3s" begin="1.0s" fill="freeze"/>
      </rect>

      <!-- Line 5 -->
      <rect x="80" y="136" width="0" height="8" rx="3" fill="#4ADE80" opacity="0.7">
        <animate attributeName="width" from="0" to="90" dur="0.4s" begin="1.8s" fill="freeze"/>
      </rect>
      <rect x="176" y="136" width="0" height="8" rx="3" fill="#94A3B8" opacity="0.4">
        <animate attributeName="width" from="0" to="40" dur="0.2s" begin="2.2s" fill="freeze"/>
      </rect>

      <!-- Cursor blink -->
      <rect x="224" y="136" width="8" height="10" rx="1" fill="#6366F1">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" begin="2.4s" repeatCount="indefinite"/>
      </rect>

      <!-- Monitor stand -->
      <rect x="215" y="175" width="50" height="10" rx="3" fill="#1C2438" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
      <rect x="190" y="183" width="100" height="6" rx="3" fill="#1C2438" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>

      <!-- Progress bar at bottom of screen -->
      <rect x="80" y="152" width="320" height="4" rx="2" fill="rgba(99,102,241,0.1)"/>
      <rect x="80" y="152" width="0" height="4" rx="2" fill="url(#barGrad)">
        <animate attributeName="width" from="0" to="120" dur="1.5s" begin="0.5s" fill="freeze"/>
      </rect>
    </svg>
  </div>

  <!-- Glitch 404 -->
  <div class="glitch-wrap">
    <span class="glitch" aria-label="404">404</span>
  </div>

  <!-- Terminal card -->
  <div class="card" role="main">
    <div class="card-bar">
      <div class="dots" aria-hidden="true">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="card-title">adesh@devstash: ~ error</span>
    </div>
    <div class="card-body">
      <div class="terminal-lines" aria-hidden="true">
        <div class="tline">
          <span class="prompt">$</span>
          <span class="tcmd">GET <span id="bad-url">/this-page</span></span>
        </div>
        <div class="tline">
          <span class="prompt">→</span>
          <span class="terror">404: Page not found</span>
        </div>
        <div class="tline">
          <span class="prompt">!</span>
          <span class="tcmd" style="color:#94A3B8;">This route doesn't exist in the stash.</span>
        </div>
        <div class="tline">
          <span class="prompt">$</span>
          <span class="tok">cd ~  # go home?</span>
        </div>
      </div>

      <p class="subtitle">
        Lagta hai galat path pe aa gaye —<br>
        ye page hamare stash mein nahi hai.
      </p>

      <div class="btn-row">
        <a class="btn-home" href="/">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 6.5L8 2l6 4.5V14a1 1 0 01-1 1H3a1 1 0 01-1-1V6.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M6 15v-5h4v5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          Go home
        </a>
        <button class="btn-back" onclick="history.back()">
          ← go back
        </button>
      </div>
    </div>
  </div>

</main>

<script>
  // Show actual bad URL in terminal line
  const badUrl = document.getElementById('bad-url');
  if (badUrl) {
    const path = window.location.pathname;
    badUrl.textContent = path.length > 28 ? path.slice(0, 28) + '…' : path;
  }
</script>
</body>
</html>
